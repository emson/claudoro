name: Release

# Publishes to npm with provenance when a version tag is pushed (e.g. v0.1.0).
# Provenance gives consumers a verifiable, signed link from package to source
# build — on-brand for a tool whose own design distrusts opaque install steps.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create GitHub releases
  id-token: write  # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run check
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            })
